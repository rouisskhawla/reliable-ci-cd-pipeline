name: CI CD Pipeline Bookstore Frontend

on:
  push:
    branches: [main, dev]
    paths:
      - 'services/bookstore-frontend/**'

jobs:
  pipeline:
    uses: rouisskhawla/github-shared-workflow/.github/workflows/ci-cd-pipeline.yml@main
    with:
      service-name: bookstore-frontend
      docker-image: khawlarouiss/ci-cd-booksstore-frontend
      service-dir: services/bookstore-frontend
      service-type: frontend

    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      KUBECONFIG_DEV:  ${{ secrets.KUBECONFIG_DEV }}
      KUBECONFIG_PROD: ${{ secrets.KUBECONFIG_PROD }}
      SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID:  ${{ secrets.SLACK_CHANNEL_ID }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}