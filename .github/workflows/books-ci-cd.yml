name: CI CD Pipeline Books Service

on:
  push:
    branches: [main, dev]
    paths:
      - 'services/books-service/**'

jobs:
  pipeline:
    uses: rouisskhawla/github-shared-workflow/.github/workflows/ci-cd-pipeline.yml@main
    with:
      service-name: books-service
      docker-image: khawlarouiss/ci-cd-books
      service-dir: services/books-service
      service-key: books_service
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      KUBECONFIG_DEV:  ${{ secrets.KUBECONFIG_DEV }}
      KUBECONFIG_PROD: ${{ secrets.KUBECONFIG_PROD }}
      SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID:  ${{ secrets.SLACK_CHANNEL_ID }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}