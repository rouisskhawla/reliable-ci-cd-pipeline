include:
  - project: 'rouis.khawla09/gitlab-shared-template'
    ref: main
    file: '/pipeline.yml'

variables:
  SERVICE_TYPE: backend

stages:
  - test
  - build
  - docker
  - deploy-staging
  - deploy-production

test-books-service:
  variables:
    SERVICE_DIR: services/books-service
  extends: .test-backend-template

build-books-service:
  variables:
    SERVICE_DIR: services/books-service
  extends: .build-backend-template
  needs:
    - job: test-books-service

docker-books-service:
  variables:
    SERVICE_DIR: services/books-service
    DOCKER_IMAGE: khawlarouiss/ci-cd-books
  extends: .docker-template
  needs:
    - job: build-books-service
      artifacts: true

deploy-staging-books-service:
  variables:
    SERVICE_NAME: books-service
  extends: .deploy-staging-template
  needs:
    - job: docker-books-service
      artifacts: true

deploy-production-books-service:
  variables:
    SERVICE_NAME: books-service
  extends: .deploy-production-template
  needs:
    - job: docker-books-service
      artifacts: true